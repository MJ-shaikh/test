<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HR Login | NHIPMPL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#003366,#0056b3);
}

.login-container{
width:380px;
background:white;
padding:40px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
text-align:center;
}

.login-container img{
width:90px;
margin-bottom:20px;
}

.login-container h2{
color:#003366;
margin-bottom:25px;
font-size:28px;
}

.input-box{
margin-bottom:18px;
}

.input-box input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
outline:none;
}

.input-box input:focus{
border-color:#0056b3;
}

.login-btn{
width:100%;
padding:14px;
background:#0056b3;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
background:#003366;
}

#error-message{
color:red;
margin-top:15px;
font-size:14px;
}

</style>

</head>

<body>

<div class="login-container">

<img src="https://raw.githubusercontent.com/MJ-shaikh/test/main/Logo.jpeg">

<h2>HR Admin Login</h2>

<div class="input-box">

<input type="email" id="email" placeholder="Enter Email">

</div>

<div class="input-box">

<input type="password" id="password" placeholder="Enter Password">

</div>

<button class="login-btn" onclick="login()">

Login

</button>

<p id="error-message"></p>

</div>

<script type="module">

import { auth } from './firebase-config.js';

import {
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

function login(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then((userCredential)=>{

window.location.href =
"admin-dashboard.html";

})

.catch((error)=>{

document.getElementById("error-message")
.innerText = error.message;

});

}

window.login = login;

</script>

</body>

</html>
