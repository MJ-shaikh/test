<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>News Gallery | NHIPMPL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

/* TITLE */

.page-title{
background:#184a97;
color:white;
text-align:center;
padding:40px;
}

.page-title h2{
font-size:48px;
}

/* GALLERY */

.gallery{
width:92%;
margin:40px auto;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.gallery img{
width:100%;
height:260px;
object-fit:cover;
border-radius:12px;
box-shadow:0 5px 18px rgba(0,0,0,0.2);
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.03);
}

</style>

</head>

<body>

<section class="page-title">

<h2>News Gallery</h2>

</section>

<div class="gallery">

<img src="https://raw.githubusercontent.com/MJ-shaikh/test/main/Raibha.jpg">

<img src="https://raw.githubusercontent.com/MJ-shaikh/test/main/Raibha2.jpg">

<img src="https://raw.githubusercontent.com/MJ-shaikh/test/main/Kelapur.jpg">

<img src="https://raw.githubusercontent.com/MJ-shaikh/test/main/Kelapur2.jpg">

</div>

</body>

</html>
