<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>News Gallery | NHIPMPL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

/* HEADER */

.top-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:white;
}

.logo-section{
display:flex;
align-items:center;
gap:20px;
}

.logo-section img{
width:90px;
}

.company-text h1{
color:#0056b3;
font-size:20px;
line-height:1.2;
}

.company-text p{
color:#003366;
font-weight:bold;
}

/* PAGE TITLE */

.page-title{
background:#184a97;
color:white;
text-align:center;
padding:45px;
}

.page-title h2{
font-size:50px;
}

/* GALLERY */

.gallery{
width:92%;
margin:40px auto;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

.gallery img{
width:100%;
height:260px;
object-fit:cover;
border-radius:12px;
box-shadow:0 5px 18px rgba(0,0,0,0.2);
transition:0.3s;
background:white;
}

.gallery img:hover{
transform:scale(1.03);
}

/* FOOTER */

footer{
background:#184a97;
color:white;
text-align:center;
padding:40px 20px;
margin-top:60px;
}

footer p{
margin:10px 0;
}

/* MOBILE */

@media(max-width:900px){

.top-header{
flex-direction:column;
gap:20px;
text-align:center;
}

.page-title h2{
font-size:36px;
}

}

</style>

</head>

<body>

<!-- HEADER -->

<header class="top-header">

<div class="logo-section">

<img src="https://raw.githubusercontent.com/MJ-shaikh/test/main/Logo.jpeg">

<div class="company-text">

<h1>
NATIONAL HIGHWAYS INVIT <br>
PROJECT MANAGERS <br>
PRIVATE LIMITED
</h1>

<p>A wholly owned entity of NHAI</p>

</div>

</div>

</header>

<!-- PAGE TITLE -->

<section class="page-title">

<h2>News Gallery</h2>

</section>

<!-- GALLERY -->

<div class="gallery">

<img src="https://raw.githubusercontent.com/MJ-shaikh/test/main/News%201.jpeg">

<img src="https://raw.githubusercontent.com/MJ-shaikh/test/main/News%202.jpg">

<img src="https://raw.githubusercontent.com/MJ-shaikh/test/main/News%203.webp">

<img src="https://raw.githubusercontent.com/MJ-shaikh/test/main/News%204.avif">

</div>

<!-- FOOTER -->

<footer>

<p>
NHAI OLD BUILDING, G5 & G6,
DWARKA SECTOR 10,
NEW DELHI - 110075
</p>

<p>Email: info.nhipmpl@nhai.org</p>

<p>
© 2026 National Highways InvIT Project Managers Private Limited
</p>

</footer>

</body>

</html>
