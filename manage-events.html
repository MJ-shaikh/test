<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Manage Events</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:40px;
}

h1{
color:#184a97;
margin-bottom:25px;
}

.form-box{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.12);
margin-bottom:30px;
}

input,
textarea{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

button{
background:#184a97;
color:white;
padding:14px 22px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.event-card{
background:white;
padding:25px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.12);
}

.delete-btn{
background:red;
margin-top:10px;
}

</style>

</head>

<body>

<h1>Manage Events</h1>

<div class="form-box">

<input type="text"
id="eventTitle"
placeholder="Event Title">

<textarea
id="eventDescription"
placeholder="Event Description">
</textarea>

<input type="date"
id="eventDate">
<label>

Upload Event Photos

</label>

<input type="file"
id="eventPhoto"
multiple>

<label>

Upload Event Documents

</label>

<input type="file"
id="eventDocument">
<button onclick="addEvent()">

Add Event

</button>

</div>

<div id="eventList">

</div>

<script type="module">

import { db } from './firebase-config.js';

import {
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ADD EVENT */

async function addEvent(){

const title =
document.getElementById("eventTitle").value;

const description =
document.getElementById("eventDescription").value;

const date =
document.getElementById("eventDate").value;

await addDoc(collection(db,"events"),{

title,
description,
date

});

alert("Event Added");

location.reload();

}

window.addEvent = addEvent;

/* LOAD EVENTS */

async function loadEvents(){

const querySnapshot =
await getDocs(collection(db,"events"));

const eventList =
document.getElementById("eventList");

querySnapshot.forEach((docItem)=>{

const data = docItem.data();

eventList.innerHTML += `

<div class="event-card">

<h2>${data.title}</h2>

<p>${data.description}</p>

<p><strong>Date:</strong>
${data.date}</p>

<button
class="delete-btn"
onclick="deleteEvent('${docItem.id}')">

Delete

</button>

</div>

`;

});

}

loadEvents();

/* DELETE EVENT */

async function deleteEvent(id){

await deleteDoc(doc(db,"events",id));

alert("Event Deleted");

location.reload();

}

window.deleteEvent = deleteEvent;

</script>

</body>

</html>
