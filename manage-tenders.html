<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Manage Tenders</title>

<style>
.back-btn{

float:right;
margin-bottom:25px;
background:#184a97;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:8px;
font-weight:bold;

}

.back-btn:hover{

background:#0056b3;

}
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:40px;
}

h1{
color:#184a97;
margin-bottom:25px;
}

.form-box{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.12);
margin-bottom:30px;
}

input,
textarea,
select{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
}

button{
background:#184a97;
color:white;
padding:14px 22px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.tender-card{
background:white;
padding:25px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.12);
}

.delete-btn{
background:red;
margin-top:10px;
}

</style>

</head>

<body>
<a href="admin-dashboard.html"
class="back-btn">

← Back to Dashboard

</a>
<h1>Manage Tenders</h1>

<div class="form-box">

<input type="text"
id="tenderNumber"
placeholder="Tender Number">

<input type="text"
id="tenderTitle"
placeholder="Tender Title">

<input type="date"
id="tenderDate">

<select id="tenderStatus">

<option value="Active">
Active Tender
</option>

<option value="Archived">
Archived Tender
</option>

</select>

<label>

Upload Tender PDF

</label>

<input type="file"
id="tenderPdf">

<label>

Upload Tender Documents

</label>

<input type="file"
id="tenderDocument"
multiple>

<button onclick="addTender()">

Add Tender

</button>

</div>

<div id="tenderList">

</div>

<script type="module">

import { db } from './firebase-config.js';

import {
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ADD TENDER */

async function addTender(){

const number =
document.getElementById("tenderNumber").value;

const title =
document.getElementById("tenderTitle").value;

const date =
document.getElementById("tenderDate").value;

const status =
document.getElementById("tenderStatus").value;

await addDoc(collection(db,"tenders"),{

number,
title,
date,
status

});

alert("Tender Added");

location.reload();

}

window.addTender = addTender;

/* LOAD TENDERS */

async function loadTenders(){

const querySnapshot =
await getDocs(collection(db,"tenders"));

const tenderList =
document.getElementById("tenderList");

querySnapshot.forEach((docItem)=>{

const data = docItem.data();

tenderList.innerHTML += `

<div class="tender-card">

<h2>${data.title}</h2>

<p>
<strong>Tender No:</strong>
${data.number}
</p>

<p>
<strong>Date:</strong>
${data.date}
</p>

<p>
<strong>Status:</strong>
${data.status}
</p>

<button
class="delete-btn"
onclick="deleteTender('${docItem.id}')">

Delete

</button>

</div>

`;

});

}

loadTenders();

/* DELETE */

async function deleteTender(id){

await deleteDoc(doc(db,"tenders",id));

alert("Tender Deleted");

location.reload();

}

window.deleteTender = deleteTender;

</script>

</body>

</html>
