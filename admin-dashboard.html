<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | NHIPMPL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
}

/* HEADER */

.dashboard-header{
background:#003366;
color:white;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.dashboard-header h1{
font-size:28px;
}

.logout-btn{
background:#ffcc00;
color:#003366;
padding:10px 18px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

/* DASHBOARD */

.dashboard-container{
width:90%;
margin:40px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

/* CARD */

.dashboard-card{
background:white;
padding:35px;
border-radius:16px;
box-shadow:0 5px 20px rgba(0,0,0,0.12);
text-align:center;
transition:0.3s;
}

.dashboard-card:hover{
transform:translateY(-8px);
}

.dashboard-card h2{
color:#003366;
margin-bottom:15px;
}

.dashboard-card p{
color:#555;
margin-bottom:20px;
line-height:1.7;
}

.dashboard-card a{
display:inline-block;
padding:12px 22px;
background:#0056b3;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.dashboard-card a:hover{
background:#003366;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="dashboard-header">

<h1>NHIPMPL Admin Dashboard</h1>

<button class="logout-btn" onclick="logout()">

Logout

</button>

</div>

<!-- DASHBOARD -->

<div class="dashboard-container">

<!-- NEWS -->

<div class="dashboard-card">

<h2>Manage News</h2>

<p>
Add, edit and delete website news updates.
</p>

<a href="manage-news.html">

Open

</a>

</div>

<!-- EVENTS -->

<div class="dashboard-card">

<h2>Manage Events</h2>

<p>
Add and manage event details and updates.
</p>

<a href="manage-events.html">

Open

</a>

</div>

<!-- TENDERS -->

<div class="dashboard-card">

<h2>Manage Tenders</h2>

<p>
Add active tenders and archive completed tenders.
</p>

<a href="manage-tenders.html">

Open

</a>

</div>

</div>

<script type="module">

import { auth } from './firebase-config.js';

import {
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

function logout(){

signOut(auth)

.then(()=>{

window.location.href =
"login.html";

});

}

window.logout = logout;

</script>

</body>

</html>
