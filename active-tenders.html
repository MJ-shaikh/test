<style>

/* ================= PREMIUM MENU ================= */

nav{
margin-left:auto;
}

nav ul{
list-style:none;
display:flex;
align-items:center;
gap:8px;
margin:0;
padding:0;
flex-wrap:nowrap;
}

nav ul li{
position:relative;
display:inline-block;
}

nav ul li a{
text-decoration:none;
color:#111;
padding:14px 18px;
display:block;
font-size:15px;
font-weight:600;
transition:0.3s;
border-radius:6px;
white-space:nowrap;
cursor:pointer;
}

nav ul li a:hover{
color:#0056b3;
background:rgba(0,86,179,0.08);
}

/* ================= DROPDOWN ================= */

.has-dropdown{
position:relative;
padding-bottom:10px;
}

.dropdown{
display:none;
position:absolute;
top:45px;
left:0;
background:white;
min-width:270px;
border-radius:10px;
overflow:visible;
box-shadow:0 10px 30px rgba(0,0,0,0.18);
z-index:9999;
animation:dropdownFade 0.25s ease;
}

.dropdown a{
padding:15px 18px;
border-bottom:1px solid #f2f2f2;
color:#222;
font-size:15px;
font-weight:500;
background:white;
transition:0.3s;
display:block;
text-decoration:none;
}

.dropdown a:hover{
background:#184a97;
color:white;
padding-left:24px;
}

.has-dropdown:hover > .dropdown{
display:block;
}

/* ================= SUBMENU ================= */

.submenu-item{
position:relative;
}

.submenu{
display:none;
position:absolute;
top:0;
left:98%;
background:white;
min-width:250px;
border-radius:10px;
overflow:visible;
box-shadow:0 10px 30px rgba(0,0,0,0.18);
animation:dropdownFade 0.25s ease;
z-index:9999;
}

.submenu a{
padding:15px 18px;
border-bottom:1px solid #f2f2f2;
background:white;
color:#222;
transition:0.3s;
display:block;
text-decoration:none;
}

.submenu a:hover{
background:#184a97;
color:white;
padding-left:24px;
}

.submenu-item:hover > .submenu{
display:block;
}

/* ================= MENU ANIMATION ================= */

@keyframes dropdownFade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}
}

/* ================= MOBILE ================= */

@media(max-width:900px){

.top-header{
display:flex;
flex-direction:row;
justify-content:space-between;
align-items:center;
width:100%;
}

.logo-section{
display:flex;
align-items:center;
}

nav{
margin-left:auto;
}

nav ul{
display:flex;
flex-direction:row !important;
align-items:center;
justify-content:flex-end;
flex-wrap:nowrap !important;
overflow-x:auto;
gap:6px;
padding-bottom:4px;
}

nav ul li{
display:inline-block;
}

nav ul li a{
cursor:pointer;
padding:10px 10px;
font-size:14px;
}

.page-title h2{
font-size:36px;
}

.tender-card{
grid-template-columns:1fr;
}

}
</style>
