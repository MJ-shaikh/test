<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Career Login | NHIPMPL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f4f7fc;
padding:20px;
}

/* LOGIN BOX */

.login-container{
width:100%;
max-width:450px;
background:white;
padding:40px;
border-radius:18px;
box-shadow:0 5px 18px rgba(0,0,0,0.12);
}

/* TITLE */

.login-title{
font-size:36px;
font-weight:bold;
color:#184a97;
text-align:center;
margin-bottom:10px;
}

.login-subtitle{
text-align:center;
font-size:16px;
color:#666;
margin-bottom:35px;
}

/* FORM */

.form-group{
margin-bottom:22px;
}

label{
display:block;
margin-bottom:10px;
font-size:16px;
font-weight:bold;
color:#184a97;
}

input{
width:100%;
padding:16px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
outline:none;
}

/* BUTTON */

.login-btn{
width:100%;
background:#184a97;
color:white;
border:none;
padding:16px;
font-size:18px;
font-weight:bold;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
background:#0f3270;
}

/* MOBILE */

@media(max-width:900px){

.login-container{
padding:28px;
}

.login-title{
font-size:30px;
}

}

</style>

</head>

<body>

<div class="login-container">

<div class="login-title">

NHIPMPL

</div>

<div class="login-subtitle">

Career Management Login

</div>

<form action="admin-dashboard.html">

<div class="form-group">

<label>
Username
</label>

<input type="text"
placeholder="Enter Username"
required>

</div>

<div class="form-group">

<label>
Password
</label>

<input type="password"
placeholder="Enter Password"
required>

</div>

<button type="submit"
class="login-btn">

Login

</button>

</form>

</div>

</body>

</html>
